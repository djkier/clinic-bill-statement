<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <script src="./js/script.js" defer></script>
    <title>Clinic Bill Statement</title>
</head>
<body>
    <main><!-- BILL INFORMATION -->
        <section id="bill-information">
            <h1>Bill Information</h1>

            <!-- PATIENT DETAILS -->
            <section id="patient-details">
                <h3>Patient Details</h3>
                
                <label for="patient-name">Patient Name</label>
                <input type="text" id="patient-name" name="patientName" placeholder="Enter patient name">

                <div class="patient-date-info">
                    <label>Date of Admission
                        <input type="date" id="admission-date" name="admissionDate">
                    </label>   

                    <label>Date of Discharge
                        <input type="date" id="discharge-date" name="dischargeDate">
                    </label>
                </div>

                <div class="patient-baby-info">
                    <label>Age
                        <input type="number" id="patient-age" name="patientAge" placeholder="Age">
                    </label>  

                    <label>Pregnancy Count
                        <input type="number" id="gravida" name="gravida" placeholder="Gravida">
                    </label>

                    <label>Parity
                        <input type="number" id="para" name="para" placeholder="Para">
                    </label>

                    <label>Baby's Gender
                        <select name="gender" id="gender">
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </label>
                </div>
            </section>

            <!-- SERVICES AND PACKAGES -->
            <section id="packages">
                <h3>Services & Packages</h3>
                <div id="mcp">
                    <label>
                        <input type="checkbox" name="mcp" value="mcp">
                        Maternity Care Package (MCP)
                    </label>

                    <div id="professional-fee">
                        <p>Professional Fee</p>
                        
                        <div class="pf">
                            <label>
                                <input type="checkbox" name="rual" value="rual">
                                Liza H. Rual, RM
                            </label>
                            <input type="number" name="rual-pf" id="rual-pf">
                        </div>

                        <div class="pf">
                            <label>
                                <input type="checkbox" name="dalire" value="dalire">
                                Dr. Genevieve Mendoza-Dalire
                            </label>
                            <input type="number" name="dalire-pf" id="dalire-pf">
                        </div>

                    </div>
                </div>

                <div id="encp">
                    <label>
                        <input type="checkbox" name="encp" value="encp">
                        Expanded Newborn Care Package (ENCP)
                    </label>
                </div>

                <div id="additional">
                    <div class="additional-header">
                        <h3>Additional Services / Medications</h3>
                        <div id="add-service-btn"> 
                            <img src="./assets/plus.svg" alt="Add" />
                            <p>Add Service</p>
                        </div>
                    </div>

                    <div id="additional-generated-services">
                        <div class="service-card">
                            <label>
                                Description
                                <input type="text" id="description-0">
                            </label>

                            <div class="quantity-unit-price">
                                <label>
                                    Quantity
                                    <input type="number" id="quantity-0" class="quantity">
                                </label>
                                <label>
                                    Unit Price
                                    <input type="number" id="unit-price-0" class="unit-price">
                                </label>
                            </div>
                            <div class="total-delete-button">
                                <p>Total: &#8369; 5,000.00</p>
                                <img src="./assets/trash.svg" alt="delete button"/>
                            </div>
                        </div>

                        
                    </div>
                    
                </div>

            </section>


        </section>


        <!-- BILL PREVIEW -->
        <section id="preview-and-generate">
            <!-- BILL PREVIEW -->
            <section id="bill-preview">
                <header>
                    <img src="./assets/LETTERHEAD.jpg" alt="letterhead"/>
                </header>
            </section>

            <!-- GENERATE BUTTON -->
            <div id="generate">
                <button>Generate PDF</button>
            </div>
        </section>
    </main>
</body>
</html>
