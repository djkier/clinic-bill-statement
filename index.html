<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <script src="./js/script.js" defer></script>
    <title>Clinic Bill Statement</title>
</head>
<body>
    <!-- BILL INFORMATION -->
    <section id="bill-information">
        <h1>Bill Information</h1>

        <!-- PATIENT DETAILS -->
        <section id="patient-details">
            <h3>Patient Details</h3>
            
            <label for="patient-name">Patient Name</label>
            <input type="text" id="patient-name" name="patientName">

            <label for="patient-age">Age</label>
            <input type="number" id="patient-age" name="patientAge">

            <label for="admission-date">Date of Admission</label>
            <input type="date" id="admission-date" name="admissionDate">

            <label for="discharge-date">Date of Discharge</label>
            <input type="date" id="discharge-date" name="dischargeDate">

            <label for="gravida">Pregnancy Count(Gravida)</label>
            <input type="number" id="gravida" name="gravida">

            <label for="Para">Parity(Para)</label>
            <input type="number" id="gravida" name="gravida">

            <label for="gender">Baby's Gender</label>
            <select name="gender" id="gender">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </section>

        <!-- SERVICES AND PACKAGES -->
        <section id="packages">
            <h3>Services & packages</h3>
            <div id="mcp">
                <label>
                    <input type="checkbox" name="mcp" value="mcp">
                    Maternity Care Package (MCP)
                </label>

                <div id="professional-fee">
                    <p>Professional Fee</p>
                    
                    <div class="pf">
                        <label>
                            <input type="checkbox" name="rual" value="rual">
                            Liza H. Rual, RM
                        </label>
                        <input type="number" name="rual-pf">
                    </div>

                    <div class="pf">
                        <label>
                            <input type="checkbox" name="dalire" value="dalire">
                            Dr. Genevieve Mendoza-Dalire
                        </label>
                        <input type="number" name="dalire-pf">
                    </div>

                </div>
            </div>

            <div id="encp">
                <label>
                    <input type="checkbox" name="encp" value="encp">
                    Expanded Newborn Care Package (ENCP)
                </label>
            </div>

            <div id="additional">
                <h3>Additional Services / Medications</h3>
                <div id="add-service"> 
                    <img src="./assets/plus.svg" alt="Add" />
                    <p>Add Service</p>
                </div>
            </div>

        </section>


    </section>


    <!-- BILL PREVIEW -->
    <section id="preview-and-generate">
        <section id="bill-preview">

        </section>
        
        <div id="generate">
            <button>Generate PDF</button>
        </div>
    </section>
</body>
</html>
